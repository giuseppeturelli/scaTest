<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaTest</title>
    <style>
        body {
            background-color: lightgreen;
            margin: 0;
            padding: 24px 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: fit-content;
        }
        .deep-links-container {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px solid #4169E1;
            border-radius: 12px;
            background-color: #F0F8FF;
            max-width: 500px;
            width: 80%;
            box-sizing: border-box;
        }
        .deep-links-container h2 {
            margin: 0 0 8px;
            font-size: 22px;
            text-align: center;
            color: #1E3A8A;
        }
        .deep-links-container ul {
            margin: 0;
            padding-left: 20px;
        }
        .deep-links-container li + li {
            margin-top: 10px;
        }
        .deep-links-container a {
            color: #4169E1;
            font-weight: bold;
            text-decoration: none;
        }
        .deep-links-container a:hover {
            text-decoration: underline;
        }
        .detected-os-badge {
            display: inline-block;
            font-size: 13px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 12px;
            margin-bottom: 14px;
            letter-spacing: 0.03em;
        }
        .detected-os-badge.android {
            background-color: #D4EDDA;
            color: #155724;
            border: 1px solid #C3E6CB;
        }
        .detected-os-badge.ios {
            background-color: #D1ECF1;
            color: #0C5460;
            border: 1px solid #BEE5EB;
        }
        .detected-os-badge.unknown {
            background-color: #FFF3CD;
            color: #856404;
            border: 1px solid #FFEEBA;
        }
        button {
                color: white;
                font-size: 20px;
                padding: 15px 30px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
            }
            .sca-btn {
                margin-top: 30px;
                background-color: green;
                margin-bottom: 24px;
            }
            .track-btn {
                background-color: #FF8C00;
                margin-bottom: 24px;
            }
            .call-btn {
                background-color: #5d00ff;
                margin-bottom: 24px;
            }
            .url-btn {
                background-color: #DC143C;
                margin-bottom: 24px;
            }
            .external-url-btn {
                background-color: #008080;
                margin-bottom: 24px;
            }
            input[type="text"] {
                font-size: 18px;
                padding: 10px;
                border: 2px solid #ccc;
                border-radius: 8px;
                margin-bottom: 24px;
                max-width: 500px;
                width: 90%;
                box-sizing: border-box;
                text-align: center;
                background-color: white;
            }
            /* Base select appearance to match inputs */
            select {
                font-size: 18px;
                padding: 10px;
                border: 2px solid #ccc;
                border-radius: 8px;
                margin-bottom: 24px;
                max-width: 500px;
                width: 100%;
                box-sizing: border-box;
                background-color: white;
                /* Make it look like a native dropdown */
                -webkit-appearance: none;
                -moz-appearance: none;
                appearance: none;
                text-align: left;
                padding-right: 40px;
                cursor: pointer;
                background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23666' d='M6 8L0 0h12z'/></svg>");
                background-repeat: no-repeat;
                background-position: calc(100% - 12px) center;
                background-size: 12px 8px;
            }
            .header-config-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-top: 30px;
                margin-bottom: 30px;
                padding: 20px;
                border: 2px solid #4169E1;
                border-radius: 12px;
                background-color: #F0F8FF;
                max-width: 500px;
                width: 80%;
            }
            .input-group {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                margin-bottom: 15px;
                width: 100%;
                max-width: 100%;
            }
            .input-group label {
                font-size: 16px;
                font-weight: bold;
                margin-right: 10px;
                min-width: 150px;
                text-align: right;
            }
            .input-group input[type="text"], .input-group select {
                margin-bottom: 0;
                flex: 1;
                width: 100%;
                box-sizing: border-box;
            }

            .input-group label {
                text-align: left;
                margin-right: 0;
                margin-bottom: 8px;
                min-width: auto;
            }
            .input-group input[type="text"], .input-group select {
                width: 100%;
            }

            .input-group input[type="checkbox"] {
                width: 20px;
                height: 20px;
                cursor: pointer;
            }
            .header-btn {
                background-color: #4169E1;
                margin-top: 15px;
            }
            .popup-btn {
                background-color: #8B0000;
                margin-bottom: 24px;
            }
            .current-step-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-top: 30px;
                margin-bottom: 30px;
                padding: 20px;
                border: 2px solid #2E8B57;
                border-radius: 12px;
                background-color: #F0FFF4;
                max-width: 500px;
                width: 80%;
            }
            .current-step-btn {
                background-color: #2E8B57;
                margin-top: 15px;
            }
            .radio-group {
                display: flex;
                gap: 20px;
                align-items: center;
                padding: 8px 0;
            }
            .radio-group label {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 16px;
                font-weight: normal;
                margin: 0;
                min-width: auto;
                text-align: left;
            }
            .radio-group input[type="radio"] {
                width: 18px;
                height: 18px;
                cursor: pointer;
            }
            .input-group input[type="number"] {
                font-size: 18px;
                padding: 10px;
                border: 2px solid #ccc;
                border-radius: 8px;
                margin-bottom: 0;
                width: 100%;
                box-sizing: border-box;
                background-color: white;
            }
    </style>
</head>
<body>
    <div class="deep-links-container">
        <h2>Deep Links</h2>
        <div style="text-align:center;">
            <span id="detected-os-badge" class="detected-os-badge"></span>
        </div>
        <ul id="deep-links-list">
        </ul>
    </div>
    <button class="sca-btn" onclick="startSca()">SCA</button>
    <button class="track-btn" onclick="trackView()">TrackView</button>
    <button class="track-btn" onclick="trackEvent()">TrackEvent</button>
    <button class="call-btn" onclick="makePhoneCall()">MakePhoneCall</button>
    <input type="text" id="urlInput" placeholder="Enter URL path">
    <button class="url-btn" onclick="openunimolUrl()">Open unimol URL</button>
    <input type="text" id="externalUrlInput" placeholder="Enter HTTP URL">
    <button class="external-url-btn" onclick="openExternalURL()">Open URL</button>
    <div class="radio-group">
        <label>showLogo:</label>
        <label><input type="radio" name="showLogo" value="true" checked> true</label>
        <label><input type="radio" name="showLogo" value="false"> false</label>
    </div>
    <button class="popup-btn" onclick="toggleShowPopUp()">ShowPopUp</button>
    
    <div class="header-config-container">
        <div class="input-group">
            <label for="shouldShowBack">shouldShowBack:</label>
            <input type="checkbox" id="shouldShowBack" checked>
        </div>
        <div class="input-group">
            <label for="backBehavior">backBehavior:</label>
            <div>Possible values: "nativePop", "webHistoryBack", or "undefined", case insensitive</div>
            <select id="backBehavior">
                <option value="nativePop">nativePop</option>
                <option value="webHistoryBack">webHistoryBack</option>
                <option value="undefined">undefined</option>
            </select>
        </div>
        <div class="input-group">
            <label for="shouldShowExit">shouldShowExit:</label>
            <input type="checkbox" id="shouldShowExit">
        </div>
        <div class="input-group">
            <label for="exitUrl">exitUrl:</label>
            <div>Partial url for redirection, if undefined or empty then nativePop</div>
            <input type="text" id="exitUrl">
        </div>
        <div class="input-group">
            <label for="headerTitle">headerTitle:</label>
            <div>Customize page title, if undefined or missing the title stays unchanged</div>
            <input type="text" id="headerTitle">
        </div>
        <button class="header-btn" onclick="applyHeaderConfig()">Apply Header Config</button>
    </div>

    <div class="current-step-container">
        <div class="input-group">
            <label for="currentStepId">id:</label>
            <input type="text" id="currentStepId" placeholder="Enter step ID">
        </div>
        <div class="input-group">
            <label for="phaseCountInput">phaseCount:</label>
            <input type="number" id="phaseCountInput" placeholder="Enter phase count" min="1">
        </div>
        <div class="input-group">
            <label for="currentPhaseInput">currentPhase:</label>
            <input type="number" id="currentPhaseInput" placeholder="Enter current phase" min="1">
        </div>
        <div class="input-group">
            <label>shouldShowBack:</label>
            <div class="radio-group">
                <label><input type="radio" name="currentStepShouldShowBack" value="true" checked> true</label>
                <label><input type="radio" name="currentStepShouldShowBack" value="false"> false</label>
            </div>
        </div>
        <div class="input-group">
            <label>shouldShowExit:</label>
            <div class="radio-group">
                <label><input type="radio" name="currentStepShouldShowExit" value="true" checked> true</label>
                <label><input type="radio" name="currentStepShouldShowExit" value="false"> false</label>
            </div>
        </div>
        <button class="current-step-btn" onclick="callCurrentStep()">currentStep</button>
    </div>
    <script>
        (function initDeepLinks() {
            const deepLinks = [
                { label: 'Account Portability - Porta in Bper', opType: 'account_portability_prod_showcase' },
                { label: 'ATP - POS Cash',                       opType: 'anticipo_transato_pos' },
                { label: 'AF - Anticipo Fatture',                opType: 'anticipo_fatture' }
            ];

            function buildAndroidUrl(opType) {
                return 'intent://bperapp?op_type=' + opType + '#Intent;scheme=bperApp;package=it.gruppobper.ams.android.bper.dev.staging;end';
            }

            function buildIosUrl(opType) {
                return 'bperApp://bperapp?op_type=' + opType;
            }

            var ua = navigator.userAgent || '';
            var isIos = /iPhone|iPad|iPod/i.test(ua);
            var isAndroid = /Android/i.test(ua);

            var badge = document.getElementById('detected-os-badge');
            var list  = document.getElementById('deep-links-list');

            var buildUrl, osLabel, badgeClass;
            if (isAndroid) {
                buildUrl   = buildAndroidUrl;
                osLabel    = '🤖 Android';
                badgeClass = 'android';
            } else if (isIos) {
                buildUrl   = buildIosUrl;
                osLabel    = '🍎 iOS';
                badgeClass = 'ios';
            } else {
                buildUrl   = buildIosUrl;
                osLabel    = '❓ Unknown OS (iOS links shown)';
                badgeClass = 'unknown';
            }

            badge.textContent = osLabel;
            badge.className   = 'detected-os-badge ' + badgeClass;

            deepLinks.forEach(function(link) {
                var li = document.createElement('li');
                var a  = document.createElement('a');
                a.href        = buildUrl(link.opType);
                a.textContent = link.label;
                li.appendChild(a);
                list.appendChild(li);
            });
        })();

        function generateUUID() {
            // Generate UUID v4 using vanilla JavaScript
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function getRandomColor() {
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FECA57', '#FF9FF3', '#54A0FF', '#5F27CD', '#00D2D3', '#FF9F43', '#10AC84', '#EE5A24', '#0984E3', '#A29BFE', '#FD79A8'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // Also listen for custom events dispatched via postMessage
        window.addEventListener('message', function(event) {
            if (event.data === 'endSca') {
                console.log('endSca message received');
                document.body.style.backgroundColor = getRandomColor();
            }
        });

        setTimeout(function() {
            console.log ("Hiding Loader")
                const loaderOff = {
                    shouldShowLoader: false
                }
                const message = {
                    command: 'showLoader',
                    title: '',
                    data: loaderOff
                };
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.showLoader) {
                    try {
                        window.webkit.messageHandlers.showLoader.postMessage(message);
                    } catch (e) {
                        console.error("error in startSca.postMessage", JSON.stringify(e));
                    }
                }
        },2000)

        function startSca() {
            const startScaData = {
                contextID: generateUUID(),
                operation: "STD"
            }
            //Android
            if (window.WebViewInterface && window.WebViewInterface.startSca) {
                try {
                    window.WebViewInterface.startSca('startSca', JSON.stringify(startScaData));
                } catch (e) {
                    console.error("error in WebViewInterface.startSca", JSON.stringify(e));
                }
            //iOS
            } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.startSca) {
                const message = {
                    command: 'startSca',
                    title: '',
                    data: startScaData
                };

                try {
                    window.webkit.messageHandlers.startSca.postMessage(message);
                } catch (e) {
                    console.error("error in startSca.postMessage", JSON.stringify(e));
                }
            }
        }

        function trackView() {
            const trackViewData= {
                title: "page-test-title",
                custom_dimensions: [{key: "tipo_polizza", value: "view_Top"}, {key: "key_test_dimension_view", value: "value_test_dimension_view"}],
                tipo_polizza: "view_base"
            }
            //Android
            if (window.WebViewInterface && window.WebViewInterface.trackView) {
                try {
                    window.WebViewInterface.trackView('trackView', JSON.stringify(trackViewData));
                } catch (e) {
                    console.error("error in WebViewInterface.trackView", JSON.stringify(e));
                }
            //iOS
            } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.tealium) {
                const message = {
                    command: 'trackView',
                    title: 'fake-screen-title',
                    data: trackViewData
                };

                try {
                    window.webkit.messageHandlers.tealium.postMessage(message);
                } catch (e) {
                    console.error("error in trackView.postMessage", JSON.stringify(e));
                }
            }
        }

        function trackEvent() {
            const trackEventData= {
                title: "page-test-title",
                custom_dimensions: [{key: "tipo_polizza", value: "Top"}, {key: "key_test_dimension", value: "value_test_dimension"}],
                tipo_polizza: "base"
            }
            //Android
            if (window.WebViewInterface && window.WebViewInterface.trackEvent) {
                try {
                    window.WebViewInterface.trackEvent('trackEvent', JSON.stringify(trackEventData));
                } catch (e) {
                    console.error("error in WebViewInterface.trackEvent", JSON.stringify(e));
                }
            //iOS
            } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.tealium) {
                const message = {
                    command: 'track',
                    title: 'fake-event-title',
                    data: trackEventData
                };

                try {
                    window.webkit.messageHandlers.tealium.postMessage(message);
                } catch (e) {
                    console.error("error in trackEvent.postMessage", JSON.stringify(e));
                }
            }
        }

        function makePhoneCall() {
            const phoneCallData= {
                phoneNumber: "+3933355511122"
            }
            //Android
            if (window.WebViewInterface && window.WebViewInterface.makePhoneCall) {
                try {
                    window.WebViewInterface.makePhoneCall('makePhoneCall', JSON.stringify(phoneCallData));
                } catch (e) {
                    console.error("error in WebViewInterface.makePhoneCall", JSON.stringify(e));
                }
            //iOS
            } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.makePhoneCall) {
                const message = {
                    command: 'makePhoneCall',
                    title: '',
                    data: phoneCallData
                };

                try {
                    window.webkit.messageHandlers.makePhoneCall.postMessage(message);
                } catch (e) {
                    console.error("error in makePhoneCall.postMessage", JSON.stringify(e));
                }
            }
        }

        function openunimolUrl() {
            const urlInput = document.getElementById('urlInput');
            const inputValue = urlInput.value.trim();
            
            if (!inputValue) {
                console.warn("URL path is empty");
                return;
            }
            
            const encodedPath = encodeURI(inputValue);
            const fullUrl = 'https://unimol/' + encodedPath;
            
            try {
                window.location.href = fullUrl;
            } catch (e) {
                console.error("error opening URL", JSON.stringify(e));
            }
        }

        function openExternalURL() {
            const urlInput = document.getElementById('externalUrlInput');
            const url = urlInput.value.trim();

            if (!url) {
                console.warn("External URL is empty");
                return;
            }

            if (!/^https?:\/\//i.test(url)) {
                console.warn("External URL must start with http:// or https://");
                return;
            }

            const data = { url };

            //Android
            if (window.WebViewInterface && window.WebViewInterface.openExternalURL) {
                try {
                    window.WebViewInterface.openExternalURL('openExternalURL', JSON.stringify(data));
                } catch (e) {
                    console.error("error in WebViewInterface.openExternalURL", JSON.stringify(e));
                }
            //iOS
            } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.openExternalURL) {
                const message = {
                    command: 'openExternalURL',
                    title: '',
                    data: data
                };

                try {
                    window.webkit.messageHandlers.openExternalURL.postMessage(message);
                } catch (e) {
                    console.error("error in openExternalURL.postMessage", JSON.stringify(e));
                }
            }
        }

        function applyHeaderConfig() {
            const shouldShowBack = document.getElementById('shouldShowBack').checked;
            const backBehavior = document.getElementById('backBehavior').value;
            const shouldShowExit = document.getElementById('shouldShowExit').checked;
            const exitUrl = document.getElementById('exitUrl').value;
            const headerTitle = document.getElementById('headerTitle').value;
            
            const data = {
                shouldShowBack,
                shouldShowExit
            };

            // Only include backBehavior if user selected a real value
            if (backBehavior && backBehavior !== 'undefined') {
                data.backBehavior = backBehavior;
            }

            if (exitUrl && exitUrl !== 'undefined') {
                data.exitUrl = exitUrl;
            }

            if (headerTitle && headerTitle !== 'undefined') {
                data.headerTitle = headerTitle;
            }
            
            console.log('Calling headerConfig with data:', data);
            headerConfig(data);
        }

        let isShowingPopUp = false;

        function toggleShowPopUp() {
            isShowingPopUp = !isShowingPopUp;
            const showLogo = document.querySelector('input[name="showLogo"]:checked').value === 'true';
            const data = { isShowingPopUp, showLogo };

            //Android
            if (window.WebViewInterface && window.WebViewInterface.showPopUp) {
                try {
                    window.WebViewInterface.showPopUp('showPopUp', JSON.stringify(data));
                } catch (e) {
                    console.error("error in WebViewInterface.showPopUp", JSON.stringify(e));
                }
            //iOS
            } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.showPopUp) {
                const message = {
                    command: 'showPopUp',
                    title: '',
                    data: data
                };

                try {
                    window.webkit.messageHandlers.showPopUp.postMessage(message);
                } catch (e) {
                    console.error("error in showPopUp.postMessage", JSON.stringify(e));
                }
            }
        }

        function callCurrentStep() {
            const id = document.getElementById('currentStepId').value.trim();
            const phaseCountVal = document.getElementById('phaseCountInput').value;
            const currentPhaseVal = document.getElementById('currentPhaseInput').value;
            const shouldShowBack = document.querySelector('input[name="currentStepShouldShowBack"]:checked').value === 'true';
            const shouldShowExit = document.querySelector('input[name="currentStepShouldShowExit"]:checked').value === 'true';

            if (!id) {
                console.warn("id is empty");
                return;
            }

            const phaseCount = parseInt(phaseCountVal, 10);
            const currentPhase = parseInt(currentPhaseVal, 10);

            if (!Number.isInteger(phaseCount) || phaseCount < 0) {
                console.warn("phaseCount must be a non-negative integer");
                return;
            }

            if (!Number.isInteger(currentPhase) || currentPhase < 0) {
                console.warn("currentPhase must be a non-negative integer");
                return;
            }

            const data = {
                id,
                phaseCount,
                currentPhase,
                shouldShowBack,
                shouldShowExit
            };

            console.log('Calling currentStep with data:', data);

            //Android
            if (window.WebViewInterface && window.WebViewInterface.currentStep) {
                try {
                    window.WebViewInterface.currentStep('currentStep', JSON.stringify(data));
                } catch (e) {
                    console.error("error in WebViewInterface.currentStep", JSON.stringify(e));
                }
            //iOS
            } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.currentStep) {
                const message = {
                    command: 'currentStep',
                    title: '',
                    data: data
                };

                try {
                    window.webkit.messageHandlers.currentStep.postMessage(message);
                } catch (e) {
                    console.error("error in currentStep.postMessage", JSON.stringify(e));
                }
            }
        }

        function headerConfig(data) {
          try {
            // Android
            if (
              typeof window !== "undefined" &&
              window.WebViewInterface &&
              window.WebViewInterface.headerConfig
            ) {
              try {
                window.WebViewInterface.headerConfig(
                  "headerConfig",
                  JSON.stringify(data),
                );
                return;
              } catch (e) {
                console.error(
                  "error in WebViewInterface.headerConfig",
                  JSON.stringify(e),
                );
              }
              // iOS
            } else if (
              typeof window !== "undefined" &&
              window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers.headerConfig
            ) {
              const message = {
                command: "headerConfig",
                title: "",
                data: data,
              };
        
              try {
                window.webkit.messageHandlers.headerConfig.postMessage(message);
                return;
              } catch (e) {
                console.error("error in headerConfig.postMessage", JSON.stringify(e));
              }
            }
            // If neither bridge is available: do nothing
          } catch (e) {
            console.error(
              "headerConfig: unexpected error",
              e && e.message ? e.message : e,
            );
          }
        }
    </script>
</body>
</html>
